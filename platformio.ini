; PlatformIO Project Configuration File
;
; Wi-Fi Scanner with Signal Map
; Target: Freenove ESP32 WROVER (bare PCB, ESP32-D0WD-V3, 4 MB flash)
; USB serial: CH340 on COM10 @ 115200 baud
; Onboard LED: GPIO2 (active-low)
; Onboard button: BOOT / GPIO0 (active-low, INPUT_PULLUP)


[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Bare PCB: 4 MB flash, default Arduino partition table is fine.
board_build.f_flash = 40000000L
board_build.flash_mode = dio

; Upload + monitor target on the Freenove WROVER's CH340.
upload_port = COM10
upload_speed = 115200
monitor_port = COM10
monitor_speed = 115200

; (No extra libraries — WiFi and esp_wifi come from the Arduino-ESP32 framework.)

; Host-only test env for the pure helpers in src/wifi_scan_util.{h,cpp}.
; Compiles the .cpp against minimal Arduino/WiFi stubs (see
; test/test_wifi_scan_util/native_compat/) so `pio test -e native`
; can link without dragging in the ESP32 toolchain. Excludes
; src/main.cpp because it depends on the full Arduino framework
; (Wire, Serial, esp_task_wdt, etc.).
[env:native]
platform = native
test_framework = unity
test_build_src = yes
; Exclude main.cpp (full Arduino framework), debounced_button.cpp and
; io_abstractions.cpp (call delay/millis/digitalRead, which the native
; stubs don't provide). The native suite only exercises the pure helpers
; in wifi_scan_util.{h,cpp}.
build_src_filter = -<main.cpp> -<debounced_button.cpp> -<io_abstractions.cpp>
build_flags = -I test/test_wifi_scan_util/native_compat