; PlatformIO Project Configuration File
;
; Wi-Fi Scanner with Signal Map
; Target: Freenove ESP32 WROVER (bare PCB, ESP32-D0WD-V3, 4 MB flash)
; USB serial: CH340 on COM10 @ 115200 baud
; Onboard LED: GPIO2 (active-low)
; Onboard button: BOOT / GPIO0 (active-low, INPUT_PULLUP)


[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Bare PCB: 4 MB flash, default Arduino partition table is fine.
board_build.f_flash = 40000000L
board_build.flash_mode = dio

; Upload + monitor target on the Freenove WROVER's CH340.
upload_port = COM10
upload_speed = 115200
monitor_port = COM10
monitor_speed = 115200

; (No extra libraries — WiFi and esp_wifi come from the Arduino-ESP32 framework.)
